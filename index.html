<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:white;
}

.header{
    text-align:center;
    padding:40px 20px;
}

.header h1{
    font-size:60px;
    margin-bottom:10px;
}

.header p{
    font-size:22px;
    color:#d1d5db;
}

.container{
    width:95%;
    max-width:1600px;
    margin:auto;
    border:2px solid #00c896;
    border-radius:20px;
    display:flex;
    flex-wrap:wrap;
    overflow:hidden;
}

.left{
    flex:1;
    min-width:350px;
    padding:80px 40px;
    text-align:center;
}

.left img{
    width:120px;
    margin-bottom:30px;
}

.left h2{
    font-size:48px;
    margin-bottom:30px;
}

.left p{
    font-size:22px;
    margin-bottom:40px;
}

.btn{
    display:inline-block;
    background:#22c55e;
    color:white;
    text-decoration:none;
    padding:18px 40px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
}

.right{
    flex:1;
    min-width:500px;
}

.right img{
    width:100%;
    height:auto;
    display:block;
}

/* Mobile Responsive */

@media (max-width:768px){

    .header{
        padding:25px 15px;
    }

    .header h1{
        font-size:34px;
    }

    .header p{
        font-size:16px;
    }

    .container{
        flex-direction:column;
        width:95%;
    }

    .left{
        min-width:100%;
        padding:35px 20px;
    }

    .left img{
        width:90px;
    }

    .left h2{
        font-size:30px;
    }

    .left p{
        font-size:18px;
    }

    .btn{
        width:100%;
        max-width:300px;
        font-size:18px;
        padding:15px 20px;
    }

    .right{
        min-width:100%;
    }

    .right img{
        width:100%;
        height:auto;
        object-fit:contain;
    }
}

</style>

</head>

<body>

<div class="header">
    <h1>Certificate Verification</h1>
    <p>This page verifies the authenticity of certificates.</p>
</div>

<div class="container">

```
<div class="left">

    <img src="certificate-icon.png" alt="Certificate">

    <h2>HTML</h2>

    <p>✅ Completed: June 20, 2026</p>

    <a class="btn" href="certificate.pdf" target="_blank">
        Download Certificate
    </a>

</div>

<div class="right">

    <img src="certificate-preview.jpg" alt="Certificate Preview">

</div>
```

</div>

</body>
</html>
